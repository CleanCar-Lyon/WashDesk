<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — WashDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0e1a;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:48px;}
.logo .lb{width:36px;height:36px;background:#1a6dff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;}
.logo .ln{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;}
.logo .ln span{color:#00d4ff;}
.code{font-family:'Syne',sans-serif;font-size:7rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#1a6dff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;}
h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:12px;}
p{color:#8892a4;font-size:.95rem;line-height:1.7;max-width:420px;margin-bottom:36px;}
.ico{font-size:3rem;margin-bottom:20px;}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn-main{background:#1a6dff;color:#fff;padding:12px 28px;border-radius:9px;text-decoration:none;font-size:.9rem;font-weight:500;transition:all .2s;}
.btn-main:hover{background:#0052e0;transform:translateY(-2px);}
.btn-sec{background:rgba(255,255,255,.06);color:#fff;padding:12px 28px;border-radius:9px;text-decoration:none;font-size:.9rem;border:1px solid rgba(255,255,255,.1);transition:all .2s;}
.btn-sec:hover{background:rgba(255,255,255,.1);}
.counter{margin-top:48px;font-size:.78rem;color:#555;}
</style>
</head>
<body>
<div class="logo">
<div class="lb">WD</div>
<div class="ln">Wash<span>Desk</span></div>
</div>
<div class="ico">🚗💨</div>
<div class="code">404</div>
<h1>Cette page a disparu...</h1>
<p>La page que vous cherchez n'existe pas ou a été déplacée. Pas de panique — retournez sur WashDesk et reprenez la route !</p>
<div class="btns">
<a href="/ERP-CRM-CleanCar-Lyon/" class="btn-main">🏠 Retour à l'accueil</a>
<a href="mailto:contact@washdesk.fr" class="btn-sec">📧 Nous contacter</a>
</div>
<div class="counter">Redirection automatique dans <span id="cnt">10</span>s</div>
<script>
let n=10;
const el=document.getElementById('cnt');
const t=setInterval(()=>{n--;el.textContent=n;if(n<=0){clearInterval(t);window.location='/ERP-CRM-CleanCar-Lyon/';}},1000);
</script>
</body>
</html>
